{% extends 'base.html' %}
{% load static %}

{% block title %}OGD Data Insights{% endblock %}

{% block content %}

<div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
  <div class="d-flex flex-wrap gap-2">
    <a href="{% url 'home' %}" class="btn btn-outline-secondary">
      <i class="fas fa-house me-2"></i>Home
    </a>
    <a href="{% url 'stories' %}" class="btn btn-outline-secondary">All insights</a>
  </div>
  <div class="d-flex flex-wrap gap-2">
    {% if prev_story_id %}
      <a href="{% url 'view_story' prev_story_id %}" class="btn btn-powder">
        <i class="fas fa-arrow-left me-2"></i>Previous
      </a>
    {% endif %}
    {% if next_story_id %}
      <a href="{% url 'view_story' next_story_id %}" class="btn btn-powder">
        Next<i class="fas fa-arrow-right ms-2"></i>
      </a>
    {% endif %}
  </div>
</div>

{% include "includes/story_detail_block.html" %}

{% endblock %}
